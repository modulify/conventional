name: Release Dry Run

on:
  workflow_dispatch:
    inputs:
      release_as:
        description: Release type (auto|major|minor|patch)
        required: false
        type: choice
        default: auto
        options:
          - auto
          - major
          - minor
          - patch
      prerelease:
        description: Prerelease channel (none|alpha|beta|rc)
        required: false
        type: choice
        default: none
        options:
          - none
          - alpha
          - beta
          - rc

jobs:
  release-dry:
    runs-on: ubuntu-22.04

    steps:
    - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x

    - name: Setup workspace
      uses: ./.github/actions/setup-workspace
      with:
        node-version: 22.x

    - name: Build packages
      run: |
        yarn build

    - name: Run release dry run
      env:
        RELEASE_AS: ${{ github.event.inputs.release_as || 'auto' }}
        PRERELEASE: ${{ github.event.inputs.prerelease || 'none' }}
      run: |
        ARGS=()

        if [ "$RELEASE_AS" != "auto" ]; then
          ARGS+=(--release-as "$RELEASE_AS")
        fi

        if [ "$PRERELEASE" != "none" ]; then
          ARGS+=(--prerelease "$PRERELEASE")
        fi

        yarn release:dry "${ARGS[@]}"
