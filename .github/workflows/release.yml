name: Release

on:
  workflow_dispatch:
    inputs:
      release_as:
        description: Release type (auto|major|minor|patch)
        required: false
        type: choice
        default: auto
        options:
          - auto
          - major
          - minor
          - patch
      prerelease:
        description: Prerelease channel (none|alpha|beta|rc)
        required: false
        type: choice
        default: none
        options:
          - none
          - alpha
          - beta
          - rc

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-22.04
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
    - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        registry-url: https://registry.npmjs.org

    - name: Run tests before release
      uses: ./.github/actions/run-tests
      with:
        node-version: 22.x
        test-command: yarn test

    - name: Configure git identity
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Build release CLI
      run: |
        yarn workspace @modulify/conventional-release build

    - name: Run release
      env:
        HUSKY: "0"
        RELEASE_AS: ${{ github.event.inputs.release_as || 'auto' }}
        PRERELEASE: ${{ github.event.inputs.prerelease || 'none' }}
      run: |
        ARGS=()

        if [ "$RELEASE_AS" != "auto" ]; then
          ARGS+=(--release-as "$RELEASE_AS")
        fi

        if [ "$PRERELEASE" != "none" ]; then
          ARGS+=(--prerelease "$PRERELEASE")
        fi

        yarn release "${ARGS[@]}"

    - name: Build packages for publish
      run: |
        yarn build

    - name: Use Node.js 24.x for publish
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        registry-url: https://registry.npmjs.org

    - name: Check npm version for publish
      run: |
        npm --version

    - name: Publish packages
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        PRERELEASE: ${{ github.event.inputs.prerelease || 'none' }}
        YARN_NPM_REGISTRY_SERVER: https://registry.npmjs.org
      run: |
        NPM_PUBLISH_ARGS=(--access public)
        YARN_PUBLISH_ARGS=(--access public --tolerate-republish)

        if [ "$NPM_TOKEN" = "NONE" ]; then
          NPM_TOKEN=""
        fi

        if [ "$PRERELEASE" != "none" ]; then
          NPM_PUBLISH_ARGS+=(--tag "$PRERELEASE")
          YARN_PUBLISH_ARGS+=(--tag "$PRERELEASE")
        fi

        if [ -n "$NPM_TOKEN" ]; then
          echo "Publishing with NPM_TOKEN"
          unset ACTIONS_ID_TOKEN_REQUEST_TOKEN
          unset ACTIONS_ID_TOKEN_REQUEST_URL

          YARN_NPM_AUTH_TOKEN="$NPM_TOKEN" yarn workspace @modulify/conventional-git npm publish "${YARN_PUBLISH_ARGS[@]}"
          YARN_NPM_AUTH_TOKEN="$NPM_TOKEN" yarn workspace @modulify/conventional-bump npm publish "${YARN_PUBLISH_ARGS[@]}"
          YARN_NPM_AUTH_TOKEN="$NPM_TOKEN" yarn workspace @modulify/conventional-changelog npm publish "${YARN_PUBLISH_ARGS[@]}"
        else
          echo "Publishing with npm trusted publishing"

          npm publish --workspace @modulify/conventional-git "${NPM_PUBLISH_ARGS[@]}"
          npm publish --workspace @modulify/conventional-bump "${NPM_PUBLISH_ARGS[@]}"
          npm publish --workspace @modulify/conventional-changelog "${NPM_PUBLISH_ARGS[@]}"
        fi

    - name: Push release commit and tags
      run: |
        git push --follow-tags origin "${GITHUB_REF_NAME}"
